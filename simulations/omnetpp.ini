[General]
network = chordp2p.ChordNetwork
sim-time-limit = 300s

# Use command-line environment for batch runs
cmdenv-express-mode = false
cmdenv-log-prefix = "[%l] "

# NED path (relative to simulations/ directory)
ned-path = ../src

# Network parameters (N is read from topo.txt automatically)
ChordNetwork.topoFile = "topo.txt"
ChordNetwork.configFile = "config.txt"
